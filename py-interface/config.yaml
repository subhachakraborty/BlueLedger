# Carbon Credit Calculation Configuration

sentinel_hub:
  client_id: ${SENTINEL_HUB_CLIENT_ID}
  client_secret: ${SENTINEL_HUB_CLIENT_SECRET}

project:
  name: "Forest Carbon Project 2026"
  aoi_file: "aoi.geojson"
  output_dir: "outputs"
  log_dir: "logs"

acquisition:
  time_intervals:
    - ["2026-01-01", "2026-01-15"]
    - ["2026-01-16", "2026-01-31"]
  output_size: [512, 512]
  
quality:
  min_coverage_percent: 80

carbon_model:
  carbon_fraction: 0.48
  co2_to_c_ratio: 3.67
  uncertainty: 0.15
  
  biomass_models:
    dense_forest:
      priority: 2
      name: "Dense Forest"
      a: 150.2
      b: -45.0
      ndvi_min: 0.6
      ndvi_max: 1.0
    moderate_forest:
      priority: 1
      name: "Moderate Forest"
      a: 120.3
      b: -35.4
      ndvi_min: 0.4
      ndvi_max: 0.6
    sparse_vegetation:
      priority: 0
      name: "Sparse Vegetation"
      a: 80.5
      b: -20.0
      ndvi_min: 0.2
      ndvi_max: 0.4
    non_forest:
      priority: -1
      name: "Non-Forest"
      a: 0.0
      b: 0.0
      ndvi_min: -1.0
      ndvi_max: 0.2

eligibility:
  ndwi_threshold: -0.65
  min_ndvi: 0.3
  min_area_ha: 1.0
  min_coverage_percent: 80

processing:
  max_retries: 3
  retry_delay_seconds: 5
